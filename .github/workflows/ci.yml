name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  root-checks:
    name: Root checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/orders-api/go.mod

      - name: Run app, contract, and gateway checks
        run: npm run check

      - name: Verify Go formatting
        run: |
          test -z "$(gofmt -l services/orders-api/cmd services/orders-api/internal)"

  cdk-checks:
    name: CDK checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra/cdk

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: infra/cdk/package.json

      - name: Install CDK dependencies
        run: npm install

      - name: Typecheck CDK code
        run: npm run typecheck

      - name: Run CDK tests
        run: npm test

      - name: Synthesize CDK app
        env:
          PROJECT_NAME: kong-platform
          ENVIRONMENT: ci
          AWS_REGION: ap-southeast-2
          KONNECT_CONTROL_PLANE_HOST: cp.konnect.example.com
          KONNECT_TELEMETRY_HOST: telemetry.konnect.example.com
          KONNECT_CLIENT_CERT_SECRET_NAME: konnect/dp/client-cert
          KONNECT_CLIENT_KEY_SECRET_NAME: konnect/dp/client-key
        run: npm run synth

  terraform-checks:
    name: Terraform checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive

      - name: Initialize Terraform
        run: terraform init -backend=false

      - name: Validate Terraform
        run: terraform validate
